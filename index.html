            { id: 19, theme: 'Conexão', text: 'Acredito fortemente que nada acontece por acaso e que estamos todos ligados por uma rede de causas e propósitos.' },
            { id: 20, theme: 'Desenvolvimento', text: 'Consigo ver o potencial oculto nos outros e sinto uma enorme satisfação ao ajudá-los a crescer e ao celebrar progressos.' },
            { id: 21, theme: 'Empatia', text: 'Consigo colocar-me facilmente no lugar dos outros e sentir as suas emoções e perspetivas como se fossem as minhas.' },
            { id: 22, theme: 'Harmonia', text: 'Evito conflitos a todo o custo e procuro sempre encontrar pontos de concordância para manter a paz e o consenso na equipe.' },
            { id: 23, theme: 'Inclusão', text: 'Sou muito sensível a pessoas que estão de fora do grupo e faço sempre um esforço proativo para as integrar e incluí-las.' },
            { id: 24, theme: 'Individualização', text: 'Fascino-me pelas características únicas de cada pessoa e percebo instintivamente como talentos diferentes podem trabalhar bem juntos.' },
            { id: 25, theme: 'Relacionamento', text: 'Prefiro aprofundar laços com amigos que já tenho do que conhecer pessoas novas; valorizo muito a lealdade e a confiança íntima.' },
            { id: 26, theme: 'Positivo', text: 'Tenho um entusiasmo contagiante e consigo quase sempre ver o lado bom das situações, animando as pessoas à minha volta.' },
            { id: 27, theme: 'Analítico', text: 'Exijo dados e provas concretas antes de aceitar qualquer afirmação; procuro sempre as causas, os padrões lógicos e a objetividade.' },
            { id: 28, theme: 'Contexto', text: 'Preciso olhar para o passado e entender a história de uma situação para conseguir compreender o presente com total clareza.' },
            { id: 29, theme: 'Futurista', text: 'Sou uma pessoa fascinada pelo futuro; crio visões detalhadas do que pode acontecer e adoro inspirar os outros com essas ideias.' },
            { id: 30, theme: 'Ideativo', text: 'Sou fascinado por ideias; consigo facilmente encontrar ligações conceituais entre fenômenos que parecem não ter qualquer relação.' },
            { id: 31, theme: 'Input', text: 'Adoro recolher e arquivar informações, ideias, objetos ou contatos, pensando sempre que poderão ser ferramentas muito úteis um dia.' },
            { id: 32, theme: 'Intelecção', text: 'Gosto muito da atividade de pensar; aprecio ter discussões filosóficas profundas e passar tempo dedicado à reflexão intelectual.' },
            { id: 33, theme: 'Estudioso', text: 'O processo vibrante de aprender algo novo entusiasma-me mais do que o resultado final; adoro adquirir novos conhecimentos.' },
            { id: 34, theme: 'Estratégico', text: 'Quando me deparo com um cenário complexo, consigo identificar instintivamente o melhor caminho e a estratégia mais eficiente a seguir.' }
        ];

        // --- FUNÇÃO PARA GERAR O RESUMO PERSONALIZADO ---
        function generatePersonalizedSummary(top10) {
            if (!top10 || top10.length < 2) return "";
            
            const counts = { 'Execução': 0, 'Influência': 0, 'Relacionamento': 0, 'Pensamento': 0 };
            top10.forEach(t => {
                const themeInfo = THEMES.find(x => x.name === t.theme);
                if(themeInfo) counts[themeInfo.domain]++;
            });
            
            const sortedDomains = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            const primaryDomain = sortedDomains[0][0];
            const primaryCount = sortedDomains[0][1];
            const secondaryDomain = sortedDomains[1][0];
            
            const domainTexts = {
                'Execução': "uma força natural incansável para transformar ideias em realidade, garantir entregas de excelência e manter altos níveis de produtividade mesmo sob forte pressão.",
                'Influência': "uma capacidade magnética para mobilizar as pessoas ao seu redor, assumir a dianteira em momentos cruciais e garantir que a sua visão impulsione toda a equipe.",
                'Relacionamento': "um dom excepcional para criar equipes coesas, construir laços de confiança profundos e fomentar a colaboração harmoniosa entre perfis muito diferentes.",
                'Pensamento': "uma mente analítica e visionária brilhante, capaz de processar variáveis complexas, antecipar cenários e traçar as melhores rotas estratégicas para o futuro do negócio."
            };

            const t1 = top10[0].theme;
            const t2 = top10[1].theme;

            const warning = primaryCount >= 5 
                ? `Com uma concentração tão forte em ${primaryDomain}, recomendamos que procure criar parcerias de trabalho com pessoas que tenham talentos em ${sortedDomains[3][0]}, garantindo assim o equilíbrio perfeito para a execução dos seus projetos.` 
                : `O seu perfil apresenta também um excelente equilíbrio com o domínio de ${secondaryDomain}, o que lhe permite ter uma abordagem altamente versátil e adaptável aos diferentes desafios que a organização enfrenta.`;

            return (
                <div>
                    <p className="mb-4">A sua assinatura de talentos é absolutamente única. Analisando o seu Top 10, o seu estilo principal de atuação encontra-se fortemente ancorado no domínio de <strong>{primaryDomain}</strong> (representando {primaryCount} dos seus 10 talentos principais). Isto confere-lhe {domainTexts[primaryDomain]}</p>
                    <p className="mb-4">A sua força motriz absoluta é o talento de <strong>{t1}</strong>, que atua como o seu filtro primário para interpretar o mundo. Ao aliar essa intensidade ao seu segundo talento, <strong>{t2}</strong>, constrói uma vantagem competitiva inegável na sua forma de trabalhar.</p>
                    <p>{warning}</p>
                </div>
            );
        }

        function App() {
            const [view, setView] = useState('reg');
            const [user, setUser] = useState({ name: '', manager: '' });
            const [answers, setAnswers] = useState(Array(34).fill(null));
            const [teamData, setTeamData] = useState([]);
            const [loading, setLoading] = useState(true);
            
            const [currentResult, setCurrentResult] = useState(null);
            const [selectedManagers, setSelectedManagers] = useState([]);
            const [memberToDelete, setMemberToDelete] = useState(null);

            useEffect(() => {
                auth.signInAnonymously().then(() => {
                    const colRef = db.collection('results');
                    colRef.onSnapshot((snap) => {
                        const data = snap.docs.map(d => ({ dbId: d.id, ...d.data() }));
                        data.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
                        setTeamData(data);
                        setLoading(false);
                    });
                }).catch(err => {
                    console.error("Erro Firebase:", err);
                    setLoading(false);
                });
            }, []);

            const filteredTeamData = useMemo(() => {
                if (selectedManagers.length === 0) return teamData;
                return teamData.filter(u => selectedManagers.includes(u.manager));
            }, [teamData, selectedManagers]);

            const toggleManagerFilter = (manager) => {
                setSelectedManagers(prev => prev.includes(manager) ? prev.filter(m => m !== manager) : [...prev, manager]);
            };

            const handleSave = async () => {
                const results = THEMES.map((t, i) => ({ theme: t.name, score: answers[i] || 0 }));
                results.sort((a, b) => b.score - a.score);
                const top10 = results.slice(0, 10);
                const ranks = {};
                top10.forEach((it, idx) => ranks[it.theme] = idx + 1);

                const newResultData = {
                    name: user.name,
                    manager: user.manager,
                    ranks,
                    top10,
                    createdAt: Date.now()
                };

                try {
                    await db.collection('results').add(newResultData);
                    setCurrentResult(newResultData);
                    setView('results'); 
                    window.scrollTo(0, 0);
                } catch (err) {
                    alert("Erro ao gravar: " + err.message);
                }
            };

            const handleDelete = async () => {
                if (!memberToDelete) return;
                try {
                    await db.collection('results').doc(memberToDelete.dbId).delete();
                    setMemberToDelete(null);
                } catch (err) {
                    alert("Erro ao excluir: " + err.message);
                }
            };

            const openReport = (memberData) => {
                setCurrentResult(memberData);
                setView('report');
                window.scrollTo(0, 0);
            };

            const startNewPerson = () => {
                setUser({ name: '', manager: '' });
                setAnswers(Array(34).fill(null));
                setCurrentResult(null);
                setView('reg');
            };

            const progress = Math.round((answers.filter(a => a !== null).length / 34) * 100);

            // --- ESTILOS DINÂMICOS PARA IMPRESSÃO ---
            const printStyles = {
                report: `@media print { @page { size: A4 portrait; margin: 1cm; } }`,
                grid: `@media print { @page { size: A4 landscape; margin: 0.5cm; } body { font-size: 8pt; } }`
            };

            // --- VISTA 1: REGISTO ---
            if (view === 'reg') return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white border-b px-6 py-4 flex justify-center items-center shadow-sm">
                        <img src={LOGO_URL} className="h-10 object-contain" alt="SulAmérica" onError={e => e.target.style.display='none'} />
                    </header>
                    <div className="flex-1 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center">
                            <h1 className="text-2xl font-bold mb-6 text-slate-800">Mapeamento de Equipe</h1>
                            <div className="space-y-4">
                                <input type="text" placeholder="O seu Nome Completo *" className="w-full p-3 border border-slate-300 rounded-lg outline-blue-500" onChange={e => setUser({...user, name: e.target.value})} value={user.name} />
                                <select className="w-full p-3 border border-slate-300 rounded-lg bg-white outline-blue-500" onChange={e => setUser({...user, manager: e.target.value})} value={user.manager}>
                                    <option value="">Selecione o seu Gestor(a) *</option>
                                    {MANAGERS.map(m => <option key={m} value={m}>{m}</option>)}
                                </select>
                                <button disabled={!user.name || !user.manager || loading} onClick={() => setView('test')} className="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 disabled:bg-slate-300 transition-colors">
                                    Começar Teste
                                </button>
                                {teamData.length > 0 && (
                                    <button onClick={() => setView('grid')} className="mt-4 text-blue-600 font-medium text-sm hover:underline">
                                        Ver Grade da Equipe ({teamData.length})
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );

            // --- VISTA 2: TESTE ---
            if (view === 'test') return (
                <div className="min-h-screen flex flex-col pb-20">
                    <header className="bg-white border-b px-6 py-4 flex justify-center items-center shadow-sm sticky top-0 z-20">
                        <img src={LOGO_URL} className="h-8 object-contain" alt="SulAmérica" onError={e => e.target.style.display='none'} />
                    </header>
                    <div className="max-w-3xl mx-auto p-4 w-full mt-6">
                        <div className="mb-8 text-center">
                            <h1 className="text-2xl font-bold">Mapeamento de Talentos</h1>
                            <p className="text-slate-500">A avaliar: <strong className="text-blue-600">{user.name}</strong></p>
                        </div>
                        
                        <div className="bg-white p-4 rounded-xl shadow-sm border mb-8 sticky top-20 z-10">
                            <div className="flex justify-between items-center mb-2"><span className="text-sm font-medium text-slate-500">Progresso</span><span className="text-sm font-bold text-blue-600">{progress}%</span></div>
                            <div className="w-full bg-slate-200 rounded-full h-2.5"><div className="bg-blue-600 h-2.5 rounded-full transition-all" style={{ width: `${progress}%` }}></div></div>
                        </div>

                        <div className="space-y-6 mb-10">
                            {QUESTIONS.map((q, i) => (
                                <div key={q.id} className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                    <p className="mb-6 font-medium text-lg flex gap-3"><span className="text-slate-400">{q.id}.</span> {q.text}</p>
                                    <div className="flex justify-between items-center gap-2">
                                        <span className="text-xs text-slate-400 font-bold uppercase hidden sm:block">Discordo</span>
                                        <div className="flex flex-1 justify-between max-w-md mx-auto">
                                            {[1, 2, 3, 4, 5].map(v => (
                                                <button key={v} onClick={() => {const n=[...answers]; n[i]=v; setAnswers(n)}} className={`w-12 h-12 rounded-full border-2 font-bold text-lg transition-all ${answers[i] === v ? 'bg-blue-600 border-blue-600 text-white transform scale-110 shadow-md' : 'border-slate-300 text-slate-400 hover:border-blue-300'}`}>{v}</button>
                                            ))}
                                        </div>
                                        <span className="text-xs text-slate-400 font-bold uppercase hidden sm:block">Concordo</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                        
                        <div className="text-center p-6 bg-white rounded-xl shadow-sm border">
                            {progress < 100 ? (
                                <p className="text-amber-600 font-bold flex items-center justify-center gap-2">Responda a todas as questões para finalizar.</p>
                            ) : (
                                <button onClick={handleSave} className="bg-blue-600 hover:bg-blue-700 text-white py-4 px-10 rounded-xl font-bold shadow-lg flex items-center gap-2 mx-auto text-lg transition-all">Gravar e Ver Resultados</button>
                            )}
                        </div>
                    </div>
                </div>
            );

            // --- VISTA 3: RESULTADOS RÁPIDOS ---
            if (view === 'results' && currentResult) return (
                <div className="min-h-screen flex flex-col p-4 md:p-8">
                    <div className="max-w-3xl mx-auto w-full">
                        <div className="bg-white rounded-2xl shadow-md border overflow-hidden mb-8">
                            <div className="bg-slate-900 p-8 text-center text-white">
                                <h2 className="text-3xl font-bold mb-2">O Seu Top 10 de Talentos</h2>
                                <p className="text-blue-300 font-medium uppercase tracking-widest text-xs">{currentResult.name}</p>
                            </div>
                            <div className="p-8 grid grid-cols-1 sm:grid-cols-2 gap-4">
                                {currentResult.top10.map((item, idx) => {
                                    const t = THEMES.find(x => x.name === item.theme) || THEMES[0];
                                    return (
                                        <div key={idx} className={`p-4 rounded-xl border-l-4 ${t.color} bg-slate-50 flex items-center gap-4 shadow-sm`}>
                                            <div className="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center font-black text-slate-600 text-sm">{idx + 1}</div>
                                            <div>
                                                <h4 className="font-bold text-slate-800">{item.theme}</h4>
                                                <p className="text-[10px] font-black uppercase text-slate-400 tracking-tighter">{t.domain}</p>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                            <div className="p-8 bg-slate-50 border-t flex flex-col gap-4">
                                <button onClick={() => openReport(currentResult)} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 px-6 rounded-xl flex items-center justify-center gap-2 shadow-lg transition-colors"><IconReport /> Ver Relatório Completo (PDF)</button>
                                <div className="flex gap-4">
                                    <button onClick={() => setView('grid')} className="flex-1 bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-4 rounded-lg flex items-center justify-center gap-2 transition-colors">Ver Grade da Equipe</button>
                                    <button onClick={startNewPerson} className="flex-1 bg-white border border-slate-300 hover:border-blue-500 hover:text-blue-600 text-slate-600 font-bold py-3 px-4 rounded-lg flex items-center justify-center gap-2 transition-all">Novo Teste</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            // --- VISTA 4: RELATÓRIO COMPLETO (PDF) ---
            if (view === 'report' && currentResult) return (
                <div className="w-full bg-slate-100 p-4 md:p-8 print:p-0 print:bg-white text-slate-800">
                    <style>{printStyles.report}</style>
                    <div className="max-w-4xl mx-auto mb-6 flex justify-between items-center print:hidden bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                        <button onClick={() => setView('grid')} className="text-slate-500 hover:text-blue-600 font-medium flex items-center gap-2 transition-colors"><IconBack /> Voltar para a Grade</button>
                        <button onClick={() => window.print()} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg flex items-center gap-2 shadow-sm transition-colors"><IconPrint /> Imprimir PDF</button>
                    </div>
                    
                    <div className="max-w-4xl mx-auto bg-white shadow-xl print:shadow-none print:w-full overflow-hidden border border-slate-200 print:border-none">
                        
                        {/* PÁGINA 1 DO PDF (Capa, Matriz e Resumo Personalizado) */}
                        <div className="p-10 md:p-14 print:p-6 flex flex-col justify-center">
                            <div className="hidden print:block mb-8"><img src={LOGO_URL} alt="SulAmérica" className="h-16 object-contain" onError={e=>e.target.style.display='none'} /></div>
                            
                            <h1 className="text-sm font-bold tracking-widest uppercase text-blue-500 mb-2">Relatório de DNA de Talentos</h1>
                            <h2 className="text-5xl font-black text-slate-900 mb-4 leading-tight">{currentResult.name}</h2>
                            <div className="flex gap-8 text-slate-500 border-b pb-6 mb-8 text-lg">
                                <p><strong>Gestor(a) direto:</strong> {currentResult.manager}</p>
                            </div>
                            
                            <h4 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4 border-b pb-2">A Matriz dos 4 Domínios de Liderança</h4>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-xs font-bold text-center mb-10">
                                <div className="p-4 border border-purple-200 text-purple-700 bg-purple-50 rounded-lg">EXECUÇÃO<br/><span className="font-normal text-[10px] mt-1 block text-purple-900">Fazer acontecer</span></div>
                                <div className="p-4 border border-orange-200 text-orange-700 bg-orange-50 rounded-lg">INFLUÊNCIA<br/><span className="font-normal text-[10px] mt-1 block text-orange-900">Inspirar os outros</span></div>
                                <div className="p-4 border border-blue-200 text-blue-700 bg-blue-50 rounded-lg">RELACIONAMENTO<br/><span className="font-normal text-[10px] mt-1 block text-blue-900">Construir a equipe</span></div>
                                <div className="p-4 border border-emerald-200 text-emerald-700 bg-emerald-50 rounded-lg">PENSAMENTO<br/><span className="font-normal text-[10px] mt-1 block text-emerald-900">Analisar e decidir</span></div>
                            </div>

                            <div className="bg-slate-50 border border-slate-200 rounded-xl p-8 shadow-sm">
                                <h3 className="text-2xl font-black text-slate-900 mb-4">A Sua Assinatura de Liderança</h3>
                                <div className="text-base text-slate-700 leading-relaxed">
                                    {generatePersonalizedSummary(currentResult.top10)}
                                </div>
                            </div>
                        </div>

                        {/* PÁGINAS SEGUINTES DO PDF (Detalhes Completos) */}
                        <div className="p-10 md:p-14 print:p-6 page-break-before border-t-8 border-slate-50 print:border-0 print:pt-4">
                            <h3 className="text-3xl font-black text-slate-900 mb-10 text-center uppercase tracking-tighter">Detalhamento Profundo do Perfil</h3>
                            <div className="space-y-12 print:space-y-8">
                                {currentResult.top10.map((item, idx) => {
                                    const t = THEMES.find(x => x.name === item.theme) || THEMES[0];
                                    return (
                                        <div key={idx} className="break-inside-avoid flex gap-6 bg-white">
                                            <div className="w-14 h-14 rounded-full border-4 border-slate-100 flex items-center justify-center font-black text-2xl text-slate-300 flex-shrink-0 bg-slate-50">{idx + 1}</div>
                                            <div className="flex-1">
                                                <div className="flex items-center gap-4 mb-3">
                                                    <h4 className="text-2xl font-black text-slate-900">{t.name}</h4>
                                                    <span className={`text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded-full border ${t.text} ${t.bg} border-${t.color} print-border`}>{t.domain}</span>
                                                </div>
                                                <p className="text-slate-700 leading-relaxed text-justify text-base">{t.desc}</p>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                            <footer className="mt-16 pt-8 border-t border-slate-200 text-center text-slate-400 text-xs">
                                <p><strong>Programa de Liderança SulAmérica</strong> • Documento confidencial para análise individual de desenvolvimento.</p>
                            </footer>
                        </div>
                        
                    </div>
                </div>
            );

            // --- VISTA 5: GRADE DA EQUIPE ---
            if (view === 'grid') return (
                <div className="p-4 md:p-8 h-screen flex flex-col bg-slate-50 print:p-0 print:h-auto print:bg-white">
                    <style>{printStyles.grid}</style>
                    {memberToDelete && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-50 no-print">
                            <div className="bg-white p-6 rounded-xl max-w-sm w-full text-center shadow-2xl">
                                <div className="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center text-red-600 mb-4 mx-auto"><IconTrash /></div>
                                <h3 className="text-xl font-bold mb-2">Eliminar Registo</h3>
                                <p className="text-slate-500 mb-6">Deseja apagar os resultados de <b>{memberToDelete.name}</b> permanentemente?</p>
                                <div className="flex gap-4">
                                    <button onClick={() => setMemberToDelete(null)} className="flex-1 p-2 border border-slate-300 rounded hover:bg-slate-50 font-medium transition-colors">Cancelar</button>
                                    <button onClick={handleDelete} className="flex-1 p-2 bg-red-600 hover:bg-red-700 text-white rounded font-medium transition-colors">Sim, Apagar</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 print:mb-2">
                        <div>
                            <h1 className="text-2xl md:text-3xl print:text-lg font-black text-slate-900">Grade de Pontos Fortes</h1>
                            <p className="text-slate-500 text-sm print:text-[10px]">A exibir {filteredTeamData.length} avaliações</p>
                        </div>
                        <div className="flex gap-3 w-full md:w-auto no-print">
                            <button onClick={() => window.print()} className="flex-1 md:flex-none bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-lg flex items-center justify-center gap-2 transition-colors"><IconPrint /> Imprimir Grelha</button>
                            <button onClick={startNewPerson} className="flex-1 md:flex-none bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center justify-center gap-2 transition-colors"><IconNew /> Novo Teste</button>
                        </div>
                    </header>

                    <div className="mb-6 p-4 bg-white rounded-xl border border-slate-200 shadow-sm no-print">
                        <div className="flex items-center gap-2 mb-3 text-xs font-bold text-slate-400 uppercase tracking-widest"><IconFilter /> Filtro por Gestor(a)</div>
                        <div className="flex flex-wrap gap-2">
                            {MANAGERS.map(m => {
                                const count = teamData.filter(u => u.manager === m).length;
                                if (count === 0 && selectedManagers.length === 0) return null;
                                const isActive = selectedManagers.includes(m);
                                return (
                                    <button 
                                        key={m} 
                                        onClick={() => toggleManagerFilter(m)} 
                                        className={`px-3 py-1.5 text-xs font-bold rounded-full border transition-all flex items-center gap-1 ${isActive ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-slate-50 text-slate-500 border-slate-200 hover:border-blue-300'}`}
                                    >
                                        {m} <span className="opacity-70 ml-1">({count})</span>
                                    </button>
                                );
                            })}
                            {selectedManagers.length > 0 && <button onClick={() => setSelectedManagers([])} className="text-xs font-bold text-slate-400 hover:text-red-500 px-2 transition-colors">Limpar filtros</button>}
                        </div>
                    </div>

                    <div className="flex-1 overflow-auto border border-slate-300 print:border-none rounded-xl print:rounded-none bg-white shadow-xl print:shadow-none custom-scrollbar relative">
                        <table className="w-max min-w-full border-collapse print:w-full">
                            <thead className="sticky top-0 bg-white z-10 shadow-sm print:shadow-none">
                                <tr>
                                    <th rowSpan="2" className="p-4 print:py-1 print:px-2 text-left border-r border-b min-w-[280px] print:min-w-[140px] print:w-[140px] bg-white font-black text-xs print:text-[9px] text-slate-400 uppercase tracking-widest">Colaborador / Gestor</th>
                                    <th colSpan="9" className="text-center text-[10px] print:text-[8px] font-bold bg-purple-100 text-purple-800 border-r border-b py-1">EXECUÇÃO</th>
                                    <th colSpan="8" className="text-center text-[10px] print:text-[8px] font-bold bg-orange-100 text-orange-800 border-r border-b py-1">INFLUÊNCIA</th>
                                    <th colSpan="9" className="text-center text-[10px] print:text-[8px] font-bold bg-blue-100 text-blue-800 border-r border-b py-1">RELACIONAMENTO</th>
                                    <th colSpan="8" className="text-center text-[10px] print:text-[8px] font-bold bg-emerald-100 text-emerald-800 border-b py-1">PENSAMENTO</th>
                                </tr>
                                <tr>
                                    {THEMES.map(t => (
                                        <th key={t.name} className={`h-40 print:h-20 p-1 text-center align-bottom border-r border-b bg-opacity-10 ${t.bg} bg-white`}>
                                            <div className="flex items-center justify-center w-full h-full">
                                                <span className="text-[10px] print:text-[7px] font-bold block whitespace-nowrap -rotate-180" style={{writingMode: 'vertical-rl'}}>{t.name}</span>
                                            </div>
                                        </th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody>
                                {filteredTeamData.map(u => (
                                    <tr key={u.dbId} className="border-b border-slate-200 hover:bg-slate-50 transition-colors group print:border-b-gray-300">
                                        <td className="p-0 border-r border-slate-200 sticky left-0 bg-white group-hover:bg-slate-50 z-10 print:static">
                                            <div className="flex justify-between items-center w-full h-full px-4 py-3 print:py-1 print:px-2">
                                                <div>
                                                    <div className="font-bold text-sm print:text-[9px] text-slate-800 truncate print:whitespace-normal print:leading-tight">{u.name}</div>
                                                    <div className="text-[10px] print:text-[7px] font-bold text-slate-400 uppercase tracking-tighter truncate print:whitespace-normal">{u.manager}</div>
                                                </div>
                                                <div className="flex gap-2 no-print opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <button onClick={() => openReport(u)} title="Ver Relatório PDF" className="p-2 text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-md transition-colors"><IconReport /></button>
                                                    <button onClick={() => setMemberToDelete(u)} title="Excluir Colaborador" className="p-2 text-red-500 bg-red-50 hover:bg-red-100 rounded-md transition-colors"><IconTrash /></button>
                                                </div>
                                            </div>
                                        </td>
                                        {THEMES.map(t => {
                                            const r = u.ranks?.[t.name];
                                            return <td key={t.name} className={`border-r border-slate-200 print:border-gray-300 text-center p-0 w-8 print:w-4 ${r ? 'bg-slate-100 print:bg-gray-100' : ''}`}>
                                                {r ? <div className="w-full h-full min-h-[56px] print:min-h-[24px] flex items-center justify-center text-sm print:text-[9px] font-black text-slate-700 print:text-black">{r}</div> : <div className="min-h-[56px] print:min-h-[24px]"></div>}
                                            </td>
                                        })}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
